Make sure no markdown.- name: Mitigate high CPU utilization on Z-XPS13
  hosts: Z-XPS13
  become: yes
  vars:
    high_cpu_threshold: 80
    cpu_check_interval: 30
    docker_services:
      - docker
      - docker.socket
  tasks:
    - name: Gather current CPU usage
      command: mpstat 1 1
      register: cpu_stats
      ignore_errors: yes

    - name: Parse CPU idle percentage
      set_fact:
        cpu_idle: "{{ cpu_stats.stdout_lines[-1].split()[-1] | float }}"

    - name: Calculate CPU usage percentage
      set_fact:
        cpu_usage: "{{ 100 - cpu_idle }}"

    - name: Debug CPU usage
      debug:
        msg: "Current CPU usage is {{ cpu_usage | round(2) }}%"

    - name: Restart Docker service if CPU usage exceeds threshold
      service:
        name: docker
        state: restarted
      when: cpu_usage | float > high_cpu_threshold

    - name: Disable unnecessary services to reduce CPU load
      systemd:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop: "{{ docker_services }}"
      when: cpu_usage | float > high_cpu_threshold

    - name: Identify top CPU consuming processes
      shell: ps -eo pid,comm,%cpu --sort=-%cpu | head -n 6
      register: top_processes
      when: cpu_usage | float > high_cpu_threshold

    - name: Kill top CPU processes except system services
      shell: |
        pid=$(echo "{{ top_processes.stdout_lines[1:] }}" | awk '{print $1}' | head -n 1)
        kill -9 $pid
      args:
        executable: /bin/bash
      when: top_processes.stdout_lines | length > 1

    - name: Clean up unused Docker containers
      command: docker container prune -f
      when: cpu_usage | float > high_cpu_threshold

    - name: Notify on issue resolution
      mail:
        host: localhost
        port: 25
        to: ops-team@example.com
        subject: "CPU mitigation applied on Z-XPS13"
        body: |
          CPU usage was above {{ high_cpu_threshold }}% on Z-XPS13.
          Applied mitigation actions: restarted Docker, stopped unnecessary services, killed top CPU process, pruned Docker containers.
          Current CPU usage is {{ cpu_usage | round(2) }}%.
      when: cpu_usage | float > high_cpu_threshold

    - name: Ensure Zabbix agent is running
      service:
        name: zabbix-agent
        state: started
        enabled: yes
      when: cpu_usage | float > high_cpu_threshold

    - name: Pause to allow system to stabilize
      pause:
        seconds: 60
      when: cpu_usage | float > high_cpu_threshold

    - name: Recheck CPU usage after mitigation
      command: mpstat 1 1
      register: post_mitigation_cpu_stats
      ignore_errors: yes

    - name: Parse post-mitigation CPU idle percentage
      set_fact:
        post_cpu_idle: "{{ post_mitigation_cpu_stats.stdout_lines[-1].split()[-1] | float }}"

    - name: Calculate post-mitigation CPU usage
      set_fact:
        post_cpu_usage: "{{ 100 - post_cpu_idle }}"

    - name: Final debug message
      debug:
        msg: "Post-mitigation CPU usage is {{ post_cpu_usage | round(2) }}%"