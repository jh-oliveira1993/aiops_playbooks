Let's produce YAML.- hosts: Z-EQR5
  gather_facts: no
  tasks:
    - name: Ensure 123miles service is running
      ansible.windows.win_service:
        name: 123miles
        state: started
        start_mode: auto
        restart: true
        timeout: 30s

    - name: Verify 123miles service status
      ansible.windows.win_service_info:
        name: 123miles
      register: service_status

    - name: Fail if service is not running after restart
      fail:
        msg: "123miles service failed to start on host {{ inventory_hostname }}"
      when: service_status.services[0].state != 'Running'