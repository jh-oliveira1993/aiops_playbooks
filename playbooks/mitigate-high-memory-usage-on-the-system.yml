---
- hosts: all
  gather_facts: no
  vars:
    service_name: web
  tasks:
    - name: Retrieve current memory usage percentage
      ansible.windows.win_shell: |
        $os = Get-CimInstance Win32_OperatingSystem
        $free = [int]$os.FreePhysicalMemory
        $total = [int]$os.TotalVisibleMemorySize
        $usage = 100 - ($free / $total * 100)
        Write-Output $usage
      register: memory_usage
      changed_when: false

    - name: Restart web service if memory usage is above threshold
      ansible.windows.win_service:
        name: "{{ service_name }}"
        state: restarted
      when: memory_usage.stdout | float > 99