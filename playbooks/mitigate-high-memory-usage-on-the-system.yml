---
- name: Mitigate high memory usage on {{ inventory_hostname }}
  hosts: Z-XPS13
  become: true
  gather_facts: true

  vars:
    memory_warning_threshold_mb: 8000   # Adjust according to host capacity
    web_service_name: web               # Service name derived from tags

  tasks:

    - name: Get current memory usage (used MB)
      ansible.builtin.shell: |
        free -m | awk '/^Mem:/ {print $3}'
      register: mem_used
      changed_when: false

    - name: Convert memory usage to integer
      ansible.builtin.set_fact:
        mem_used_mb: "{{ mem_used.stdout | int }}"

    - name: Debug memory usage
      ansible.builtin.debug:
        msg: "Current used memory: {{ mem_used_mb }} MB"

    - name: Restart web service if memory usage exceeds threshold
      ansible.builtin.systemd:
        name: "{{ web_service_name }}"
        state: restarted
      when: mem_used_mb > memory_warning_threshold_mb

    - name: Flush caches to reclaim memory
      ansible.builtin.shell: |
        sync; echo 3 > /proc/sys/vm/drop_caches
      args:
        executable: /bin/bash
      when: mem_used_mb > memory_warning_threshold_mb