---
- name: Ensure NGINX service is running on Windows host
  hosts: Z-EQR5
  become: true  # privilege escalation to gain administrator privileges
  tasks:
    - name: Check NGINX service status
      ansible.windows.win_service_state:
        name: nginx
        state: started
      register: nginx_service

    - name: Debug NGINX service status
      ansible.windows.win_shell: |
        Get-Service -Name nginx | Format-Table Name, Status
      register: service_status
      changed_when: false

    - name: Show service status
      ansible.builtin.debug:
        var: service_status.stdout