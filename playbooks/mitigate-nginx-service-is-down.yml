---
- name: Ensure NGINX service is running on Windows host
  hosts: Z-EQR5
  gather_facts: no
  become: yes
  become_method: runas
  become_user: Administrator

  tasks:
    - name: Check NGINX service status
      ansible.windows.win_service:
        name: nginx
      register: nginx_service
      ignore_errors: yes

    - name: Start NGINX service if stopped
      ansible.windows.win_service:
        name: nginx
        state: started
        enabled: yes
      when: nginx_service.exists and nginx_service.state == 'stopped'
      ignore_errors: yes

    - name: Get NGINX service status via PowerShell
      ansible.windows.win_shell: |
        Get-Service -Name nginx | Select-Object Name, Status
      register: service_status
      changed_when: false
      ignore_errors: yes

    - name: Show service status
      ansible.builtin.debug:
        var: service_status.stdout
      when: service_status is defined