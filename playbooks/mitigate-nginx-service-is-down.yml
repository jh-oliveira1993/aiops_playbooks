---
- name: Restart nginx service
  hosts: all
  become: true
  become_method: sudo
  become_user: root

  tasks:
    - block:
        - name: Restart nginx
          ansible.builtin.service:
            name: nginx
            state: restarted
      rescue:
        - name: Report failure to restart nginx
          ansible.builtin.debug:
            msg: "Failed to restart nginx on {{ inventory_hostname }}. Check service status."