---
- name: Ensure NGINX service is running on Windows host
  hosts: Z-EQR5
  gather_facts: yes
  tasks:
    - name: Check NGINX service status
      ansible.windows.win_service:
        name: nginx
      register: nginx_service
      ignore_errors: true
      when: ansible_facts['os_family'] == 'Windows'

    - name: Start NGINX service if stopped
      ansible.windows.win_service:
        name: nginx
        state: started
      when:
        - ansible_facts['os_family'] == 'Windows'
        - nginx_service.exists is defined
        - nginx_service.exists
        - nginx_service.state == 'stopped'
      ignore_errors: true

    - name: Debug NGINX service status
      ansible.windows.win_shell: |
        Get-Service -Name nginx | Format-Table Name, Status
      register: service_status
      changed_when: false
      ignore_errors: true
      when: ansible_facts['os_family'] == 'Windows'

    - name: Show service status
      ansible.builtin.debug:
        var: service_status.stdout
      when: ansible_facts['os_family'] == 'Windows'